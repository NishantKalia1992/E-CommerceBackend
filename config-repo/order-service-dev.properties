# ===============================
# DEV ENVIRONMENT (Local Machine)
# ===============================

server.port=8002

spring.datasource.url=jdbc:mysql://localhost:3306/order_service
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Local Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# Force the service to register with Eureka using its IP address

# Uses localhost because you are running it directly on your Windows machine
#customer.client.url=http://localhost:8001/api/auth/customer
#product.client.url=http://localhost:8003/api/category
#payment.client.url=http://localhost:8007/api/payment
# This tells Spring: "Look for Kafka on my computer at port 9092"
spring.kafka.bootstrap-servers=localhost:9092
