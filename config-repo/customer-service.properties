# Universal Settings
spring.application.name=customer-service
#server.port=8001
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Set the default profile to DEV so your IDE runs locally automatically
#spring.profiles.active=dev

# Local Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Force the service to register with Eureka using an IP address, not a hostname
eureka.instance.prefer-ip-address=true


# 1. Tell Micrometer to record 100% of all requests (1.0 = 100%)
# (In production, companies usually set this to 0.1 so they only record 10% to save memory)
management.tracing.sampling.probability=1.0

# 2. Tell the services where the Zipkin Docker container lives
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans