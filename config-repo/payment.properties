spring.datasource.url=jdbc:mysql://localhost:3306/payment_service
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
#eureka.client.service-url.defaultZone=http://service-registry:8761/eureka

spring.kafka.producer.bootstrap-servers=Kafka:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Tell Kafka: If you see the nickname 'paymentConfirmation', turn it into my local class!
spring.kafka.producer.properties.spring.json.type.mapping=paymentConfirmation:com.payment.dto.PaymentNotificationRequest

