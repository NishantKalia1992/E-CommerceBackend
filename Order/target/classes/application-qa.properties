# ===============================
# QA ENVIRONMENT (Local Docker)
# ===============================

# Docker Network Database
spring.datasource.url=jdbc:mysql://localhost:3306/order_service
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# This tells Spring: "Look for Kafka on my computer at port 9092"
spring.kafka.bootstrap-servers=Kafka:9092

# Uses the container name because it runs inside the Docker network
customer.client.url=http://customer-service:8001/api/auth/customer


eureka.client.service-url.dafaultZone = http://service-registry:8761/eureka

# These are standard settings for sending/receiving text/json
spring.kafka.consumer.group-id=my-group-id
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
#spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
#spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer